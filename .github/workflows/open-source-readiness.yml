name: Open Source Readiness

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  docs-and-examples:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run readiness checks
        shell: pwsh
        run: .\scripts\check-open-source-readiness.ps1 -SkipGradle
